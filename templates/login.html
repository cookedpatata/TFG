{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet" href="{% static 'css/login.css' %}">

</head>

<body>

    <div class="login-box">

        <h1>Iniciar Sesión</h1>

        <form method="POST">

            {% csrf_token %}

            <input type="email" name="correo" placeholder="Correo electrónico" required>

            <input type="password" name="password" placeholder="Contraseña" required>

            <button type="submit">
                Entrar
            </button>

        </form>

    </div>

</body>

</html>
