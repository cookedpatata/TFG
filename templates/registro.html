{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

       <meta charset="UTF-8">

       <title>Registro</title>

       <link rel="stylesheet" href="{% static 'css/registro.css' %}">
       <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

       <script src="{% static 'js/registro.js' %}"></script>

</head>

<body>
       <nav class="navbar">

              <div class="logo">

                     <i class="fa-solid fa-trophy"></i>

                     <span>HippoTrack</span>

              </div>

              <ul class="nav-links">

                     <li>
                            <a href="{% url 'index' %}">
                                   Volver
                            </a>
                     </li>
              </ul>
       </nav>

       <div class="registro-box">

              <h1>Registro</h1>

              {% if messages %}

              <div class="mensajes">

                     {% for message in messages %}

                     {% if message.tags == 'error' %}

                     <div class="mensaje-error">

                            {{ message }}

                     </div>

                     {% endif %}

                     {% endfor %}

              </div>

              {% endif %}

              <form method="POST">

                     {% csrf_token %}

                     <input type="email" id="email" name="email" placeholder="Correo" required>

                     <small id="email-error" class="error"></small>

                     <input type="password" id="password" name="password" placeholder="Contraseña" required>

                     <small id="password-error" class="error"></small>

                     <input type="text" id="username" name="username" placeholder="Nombre" minlength="3" maxlength="20"
                            required>

                     <small id="username-error" class="error"></small>

                     <input type="text" id="apellidos" name="apellidos" placeholder="Apellidos" minlength="2"
                            maxlength="40" required>

                     <small id="apellidos-error" class="error"></small>

                     <input type="date" id="fecha_nac" name="fecha_nac" required>

                     <small id="fecha-error" class="error"></small>

                     <input type="text" id="dni" name="dni" placeholder="DNI" maxlength="9" required>

                     <small id="dni-error" class="error"></small>

                     <button type="submit">
                            Registrarse
                     </button>

              </form>

       </div>

</body>

</html>
